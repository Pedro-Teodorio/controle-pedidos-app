<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Controle de Pedidos — Wireframes &amp; Protótipo</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Inter','system-ui','sans-serif'], mono: ['JetBrains Mono','monospace'] }
      }
    }
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html { scroll-behavior: smooth; font-family: 'Inter', sans-serif; }
  body { font-family: 'Inter', sans-serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* Phone frame */
  .phone-frame {
    width: 320px;
    height: 660px;
    border-radius: 44px;
    padding: 10px;
    background: #0f172a;
    box-shadow: 0 24px 60px -20px rgba(15,23,42,0.4), 0 0 0 1px rgba(15,23,42,0.06);
  }
  .phone-screen {
    width: 100%; height: 100%;
    border-radius: 34px;
    overflow: hidden;
    background: #F8FAFC;
    position: relative;
  }
  .phone-notch {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    width: 110px; height: 26px; background: #0f172a; border-radius: 14px; z-index: 50;
  }
  .phone-static {
    width: 290px;
    border-radius: 28px;
    border: 1px solid #e2e8f0;
    background: white;
    padding: 8px;
    box-shadow: 0 4px 14px -6px rgba(15,23,42,0.1);
  }
  .phone-static-screen {
    border-radius: 22px;
    background: #F8FAFC;
    padding: 14px;
    min-height: 540px;
    position: relative;
  }

  /* Scrollbar styling */
  .nice-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
  .nice-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  .nice-scroll::-webkit-scrollbar-track { background: transparent; }

  /* Wireframe placeholder */
  .wf-skeleton {
    background: repeating-linear-gradient(45deg, #f1f5f9, #f1f5f9 6px, #f8fafc 6px, #f8fafc 12px);
  }

  /* Slide-in transition for prototype screens */
  .screen-enter { animation: screenEnter 220ms cubic-bezier(0.2, 0.8, 0.2, 1); }
  @keyframes screenEnter {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .screen-enter-back { animation: screenEnterBack 220ms cubic-bezier(0.2, 0.8, 0.2, 1); }
  @keyframes screenEnterBack {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .sheet-enter { animation: sheetEnter 260ms cubic-bezier(0.2, 0.8, 0.2, 1); }
  @keyframes sheetEnter {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .fade-in { animation: fadeIn 200ms ease-out; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* Tab nav */
  .tab-btn { transition: all 120ms ease; }
  .tab-btn[data-active="true"] { background: #0f172a; color: white; }
  .tab-btn:hover:not([data-active="true"]) { background: #e2e8f0; }

  /* Animated dots loader */
  @keyframes pulse-dot {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }
  .loader-dot { animation: pulse-dot 1.2s ease-in-out infinite; }
  .loader-dot:nth-child(2) { animation-delay: 0.2s; }
  .loader-dot:nth-child(3) { animation-delay: 0.4s; }

  /* Tag styling on wireframe annotations */
  .wf-annotation { font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; font-weight: 700; color: #64748b; }

  /* Tap ripple */
  .tap-target { position: relative; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .tap-target:active { transform: scale(0.98); }
  .tap-target { transition: transform 80ms; }
</style>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900 antialiased">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/data.jsx"></script>
  <script type="text/babel" src="src/ui.jsx"></script>
  <script type="text/babel" src="src/prototype.jsx"></script>
  <script type="text/babel" src="src/screens.jsx"></script>
  <script type="text/babel" src="src/components.jsx"></script>
  <script type="text/babel" src="src/docs.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
